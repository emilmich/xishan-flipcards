<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>《始得西山宴遊記》Flip Cards（短語版）</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: "Microsoft JhengHei", "Noto Sans TC", "PingFang TC", sans-serif;
  background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 20px;
}

.header {
  text-align: center;
  margin-bottom: 20px;
}
.header h1 { font-size: 1.5em; color: #333; margin-bottom: 5px; }
.header .subtitle { font-size: 0.9em; color: #666; }

.controls {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  align-items: center;
  justify-content: center;
  margin-bottom: 20px;
  background: #fff;
  padding: 12px 20px;
  border-radius: 12px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.1);
  max-width: 800px;
  width: 100%;
}
.controls label { font-size: 0.85em; color: #555; }
.controls select, .controls button {
  font-size: 0.85em;
  padding: 6px 12px;
  border-radius: 6px;
  border: 1px solid #ccc;
  background: #fff;
  cursor: pointer;
  font-family: inherit;
}
.controls button {
  background: #4472C4;
  color: #fff;
  border: none;
  transition: background 0.2s;
}
.controls button:hover { background: #3458a0; }
.controls button:active { transform: scale(0.97); }
.controls .count { font-size: 0.85em; color: #888; margin-left: auto; }

.mode-switch {
  display: flex;
  gap: 0;
  background: #e8e8e8;
  border-radius: 8px;
  overflow: hidden;
  margin-bottom: 15px;
}
.mode-switch button {
  font-size: 0.85em;
  padding: 8px 20px;
  border: none;
  cursor: pointer;
  background: transparent;
  font-family: inherit;
  transition: all 0.2s;
}
.mode-switch button.active {
  background: #4472C4;
  color: #fff;
  font-weight: 600;
}

.card-container {
  perspective: 1000px;
  width: 100%;
  max-width: 520px;
  height: 340px;
  margin-bottom: 20px;
  cursor: pointer;
}
.card {
  position: relative;
  width: 100%;
  height: 100%;
  transition: transform 0.5s cubic-bezier(0.4, 0.0, 0.2, 1);
  transform-style: preserve-3d;
}
.card.flipped { transform: rotateY(180deg); }
.card-face {
  position: absolute;
  top: 0; left: 0;
  width: 100%;
  height: 100%;
  backface-visibility: hidden;
  border-radius: 16px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 30px;
  box-shadow: 0 8px 30px rgba(0,0,0,0.15);
  text-align: center;
}
.card-front {
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  color: #fff;
}
.card-front .phrase-text {
  font-size: 2em;
  font-weight: 700;
  line-height: 1.6;
  letter-spacing: 2px;
}
.card-front .box {
  display: inline-block;
  border: 3px solid #FFD700;
  border-radius: 6px;
  padding: 2px 8px;
  margin: 0 2px;
  background: rgba(255, 215, 0, 0.15);
  color: #FFD700;
  font-weight: 700;
}
.card-front .para-tag {
  margin-top: 15px;
  font-size: 0.8em;
  opacity: 0.7;
}
.card-back {
  background: #fff;
  color: #333;
  transform: rotateY(180deg);
}
.card-back .pos-tag {
  font-size: 0.8em;
  color: #666;
  background: #f0f0f0;
  padding: 3px 10px;
  border-radius: 20px;
  margin-bottom: 12px;
}
.card-back .meaning { font-size: 1.5em; font-weight: 600; margin-bottom: 10px; line-height: 1.4; }
.card-back .detail {
  font-size: 0.9em;
  color: #666;
  line-height: 1.5;
  max-width: 90%;
}
.quiz-buttons {
  display: none;
  gap: 15px;
  margin-bottom: 15px;
}
.quiz-buttons.show { display: flex; }
.quiz-buttons button {
  font-size: 1em;
  padding: 10px 25px;
  border: none;
  border-radius: 10px;
  cursor: pointer;
  font-family: inherit;
  transition: all 0.2s;
  font-weight: 600;
}
.quiz-buttons button:active { transform: scale(0.95); }
.btn-remember { background: #4CAF50; color: #fff; }
.btn-remember:hover { background: #388E3C; }
.btn-forget { background: #F44336; color: #fff; }
.btn-forget:hover { background: #D32F2F; }

.quiz-progress {
  font-size: 0.85em;
  color: #666;
  margin-bottom: 10px;
  text-align: center;
}

.nav {
  display: flex;
  gap: 15px;
  align-items: center;
  margin-bottom: 15px;
}
.nav button {
  font-size: 1.5em;
  padding: 8px 20px;
  border: none;
  border-radius: 10px;
  cursor: pointer;
  background: #4472C4;
  color: #fff;
  transition: background 0.2s;
}
.nav button:hover { background: #3458a0; }
.nav button:disabled { background: #ccc; cursor: default; }
.nav .progress {
  font-size: 1em;
  color: #555;
  min-width: 80px;
  text-align: center;
}

.progress-bar-bg {
  width: 100%;
  max-width: 520px;
  height: 6px;
  background: #e0e0e0;
  border-radius: 3px;
  margin-bottom: 10px;
}
.progress-bar-fill {
  height: 100%;
  background: linear-gradient(90deg, #667eea, #764ba2);
  border-radius: 3px;
  transition: width 0.3s;
}

.quiz-bar-bg {
  width: 100%;
  max-width: 520px;
  height: 8px;
  background: #e0e0e0;
  border-radius: 4px;
  margin-bottom: 15px;
  display: none;
}
.quiz-bar-bg.show { display: block; }
.quiz-bar-fill {
  height: 100%;
  background: linear-gradient(90deg, #4CAF50, #8BC34A);
  border-radius: 4px;
  transition: width 0.3s;
}

.complete-msg {
  display: none;
  flex-direction: column;
  align-items: center;
  gap: 15px;
  background: #fff;
  padding: 30px;
  border-radius: 16px;
  box-shadow: 0 8px 30px rgba(0,0,0,0.15);
  text-align: center;
  max-width: 400px;
  margin-bottom: 15px;
}
.complete-msg.show { display: flex; }
.complete-msg .big { font-size: 2em; }
.complete-msg .msg { font-size: 1.1em; color: #333; }
.complete-msg .sub { font-size: 0.85em; color: #999; }
.complete-msg button {
  font-size: 1em;
  padding: 10px 30px;
  border: none;
  border-radius: 10px;
  background: #4472C4;
  color: #fff;
  cursor: pointer;
  font-family: inherit;
}

.hint { font-size: 0.8em; color: #999; text-align: center; }

@media (max-width: 600px) {
  .card-container { height: 280px; }
  .card-front .phrase-text { font-size: 1.5em; }
  .card-back .meaning { font-size: 1.2em; }
  .controls { flex-direction: column; }
  .controls .count { margin-left: 0; }
}
</style>
</head>
<body>

<div class="header">
  <h1>《始得西山宴遊記》</h1>
  <div class="subtitle">短語 Flip Card</div>

    <option value="二">第二段：遊西山經過</option>

<div class="quiz-buttons" id="quizButtons">

  <button class="btn-forget" id="forgetBtn">✗ 不記得</button>

<div class="quiz-bar-bg" id="quizBarBg">

</div>

<div class="nav">
  <button id="prevBtn">◀</button>
  <span class="progress" id="progressText">0 / 0</span>
  <button id="nextBtn">▶</button>
</div>

<div class="progress-bar-bg">

<div class="complete-msg" id="completeMsg">

  <div class="sub">你已掌握了所有字詞</div>
  <button id="restartQuizBtn">重新測驗</button>
</div>

<div class="hint" id="hintText">點擊卡片翻面 · 方向鍵 ← → 切換 · 空白鍵翻卡</div>

function buildFrontHTML(phrase, boxed) {
  if (!phrase) return '<span class="box">' + boxed + '</span>';
  const idx = phrase.indexOf(boxed);
  if (idx === -1) return '<span class="box">' + boxed + '</span>';
  const before = phrase.substring(0, idx);
  const after = phrase.substring(idx + boxed.length);
  let result = '';
  if (before) result += escapeHtml(before);
  result += '<span class="box">' + escapeHtml(boxed) + '</span>';
  if (after) result += escapeHtml(after);
  return result;
}

function escapeHtml(s) {
  return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

let isQuizMode = false;
let currentCards = [...ALL_CARDS];
let currentIndex = 0;
let isFlipped = false;
let quizPool = [];
let quizDone = 0;

// --- DOM refs ---
const card = document.getElementById('card');
const frontText = document.getElementById('frontText');

// --- Browse mode ---
function filterCards() {
  const para = paraFilter.value;
  currentCards = ALL_CARDS.filter(c => {
    if (para !== 'all' && c.para !== para) return false;
    return true;
  });
  currentIndex = 0;
  isFlipped = false;
  card.classList.remove('flipped');
  updateDisplay();
}

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function renderCurrent() {
  if (currentCards.length === 0) {
    frontText.innerHTML = '—';
    frontPara.textContent = '沒有符合的卡片';
    backPos.textContent = '—';
    backMeaning.textContent = '—';
    backDetail.textContent = '—';
    return;
  }
  const c = currentCards[currentIndex];
  frontText.innerHTML = buildFrontHTML(c.phrase, c.boxed);
  frontPara.textContent = c.paraLabel;
  backPos.textContent = c.back.match(/^\[([^\]]+)\]/)?.[1] || '';
  backMeaning.textContent = c.back.replace(/^\[[^\]]+\]\s*/, '');
  backDetail.textContent = c.detail || '';
  progressText.textContent = (currentIndex + 1) + ' / ' + currentCards.length;
  const pct = currentCards.length > 0 ? ((currentIndex + 1) / currentCards.length * 100) : 0;
  progressBar.style.width = pct + '%';
  countDisplay.textContent = '共 ' + currentCards.length + ' 張';
  prevBtn.disabled = currentIndex === 0;
  nextBtn.disabled = currentIndex >= currentCards.length - 1;
}

function updateDisplay() { renderCurrent(); }

function flipCard() {
  if (currentCards.length === 0) return;
  isFlipped = !isFlipped;
  card.classList.toggle('flipped', isFlipped);
  if (isQuizMode && isFlipped) {
    quizButtons.classList.add('show');
  }
}

function goPrev() {
  if (currentIndex > 0) {
    currentIndex--;
    isFlipped = false;
    card.classList.remove('flipped');
    renderCurrent();
  }
}

function goNext() {
  if (currentIndex < currentCards.length - 1) {
    currentIndex++;
    isFlipped = false;
    card.classList.remove('flipped');
    renderCurrent();
  }
}

// --- Quiz mode ---
function enterQuizMode() {
  isQuizMode = true;
  browseModeBtn.classList.remove('active');
  quizModeBtn.classList.add('active');
  const para = paraFilter.value;
  quizPool = ALL_CARDS.filter(c => {
    if (para !== 'all' && c.para !== para) return false;
    return true;
  });
  shuffle(quizPool);
  quizDone = 0;
  quizTotal = quizPool.length;
  currentCards = quizPool;
  currentIndex = 0;
  isFlipped = false;
  card.classList.remove('flipped');
  quizButtons.classList.remove('show');
  completeMsg.classList.remove('show');
  quizBarBg.classList.add('show');
  prevBtn.style.display = 'none';
  nextBtn.style.display = 'none';
  progressText.parentElement.style.display = 'none';
  progressBar.parentElement.style.display = 'none';
  shuffleBtn.style.display = 'none';
  hintText.textContent = '點擊卡片翻面查看答案，然後按「記得」或「不記得」';
  updateQuizUI();
  renderCurrent();
}

function exitQuizMode() {
  isQuizMode = false;
  browseModeBtn.classList.add('active');
  quizModeBtn.classList.remove('active');
  quizButtons.classList.remove('show');
  completeMsg.classList.remove('show');
  quizBarBg.classList.remove('show');
  prevBtn.style.display = '';
  nextBtn.style.display = '';
  progressText.parentElement.style.display = '';
  progressBar.parentElement.style.display = '';
  shuffleBtn.style.display = '';
  hintText.textContent = '點擊卡片翻面 · 方向鍵 ← → 切換 · 空白鍵翻卡';
  filterCards();
}

function updateQuizUI() {
  const remaining = quizPool.length;
  const total = quizTotal;
  quizProgress.textContent = '已完成 ' + quizDone + ' / 共 ' + total + ' 張';
  const pct = total > 0 ? (quizDone / total * 100) : 0;
  quizBarFill.style.width = pct + '%';
  countDisplay.textContent = '剩 ' + remaining + ' 張';
}

function handleRemember() {
  if (!isQuizMode || quizPool.length === 0) return;
  quizPool.splice(currentIndex, 1);
  quizDone++;
  isFlipped = false;
  card.classList.remove('flipped');
  quizButtons.classList.remove('show');
  if (quizPool.length === 0) {
    updateQuizUI();
    showQuizComplete();
    return;
  }
  if (currentIndex >= quizPool.length) currentIndex = quizPool.length - 1;
  updateQuizUI();
  renderCurrent();
}

function handleForget() {
  if (!isQuizMode || quizPool.length === 0) return;
  // Put the card back at a random position
  const cardData = quizPool.splice(currentIndex, 1)[0];
  const insertAt = Math.floor(Math.random() * (quizPool.length + 1));
  quizPool.splice(insertAt, 0, cardData);
  // Reset flip
  isFlipped = false;
  card.classList.remove('flipped');
  quizButtons.classList.remove('show');
  currentIndex = Math.floor(Math.random() * quizPool.length);
  updateQuizUI();
  renderCurrent();
}

function showQuizComplete() {
  completeMsg.classList.add('show');
  cardContainer.style.display = 'none';
  quizButtons.classList.remove('show');
  quizBarFill.style.width = '100%';
  quizProgress.textContent = '已完成 ' + quizDone + ' / 共 ' + quizTotal + ' 張';
}

function restartQuiz() {
  completeMsg.classList.remove('show');
  cardContainer.style.display = '';
  enterQuizMode();
}

// --- Event listeners ---
cardContainer.addEventListener('click', flipCard);

paraFilter.addEventListener('change', () => {
  if (isQuizMode) enterQuizMode(); else filterCards();
});

shuffleBtn.addEventListener('click', () => {
  if (isQuizMode) return;
  shuffle(currentCards);
  currentIndex = 0;
  isFlipped = false;
  card.classList.remove('flipped');
  renderCurrent();
});

browseModeBtn.addEventListener('click', exitQuizMode);

quizModeBtn.addEventListener('click', enterQuizMode);

rememberBtn.addEventListener('click', handleRemember);
forgetBtn.addEventListener('click', handleForget);

restartQuizBtn.addEventListener('click', restartQuiz);

prevBtn.addEventListener('click', goPrev);
nextBtn.addEventListener('click', goNext);

document.addEventListener('keydown', (e) => {
  if (e.key === 'ArrowLeft') goPrev();
  else if (e.key === 'ArrowRight') goNext();
  else if (e.key === ' ' || e.key === 'Space') { e.preventDefault(); flipCard(); }
  else if (e.key === 'r' || e.key === 'R') handleRemember();
  else if (e.key === 'f' || e.key === 'F') handleForget();
});

// Init
filterCards();
</script>
</body>
</html>
